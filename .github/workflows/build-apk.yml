name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Recreate Android project
        run: |
          rm -rf android test
          flutter create --platforms android --org com.explapp --project-name arabic_debt_ledger .
          rm -rf test

      - name: Configure Android project
        run: |
          if [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId ".*"/applicationId "com.explapp.arabic_debt_ledger"/g' android/app/build.gradle
            sed -i 's/namespace ".*"/namespace "com.explapp.arabic_debt_ledger"/g' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 21/g' android/app/build.gradle
          fi

          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = ".*"/applicationId = "com.explapp.arabic_debt_ledger"/g' android/app/build.gradle.kts
            sed -i 's/namespace = ".*"/namespace = "com.explapp.arabic_debt_ledger"/g' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle.kts
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 21/g' android/app/build.gradle.kts
          fi

      - name: Write Android Manifest
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:label="دفتر الديون"
                  android:name="\${applicationName}"
                  android:icon="@mipmap/ic_launcher">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <meta-data
                      android:name="com.google.android.gms.ads.APPLICATION_ID"
                      android:value="ca-app-pub-3082968903080396~1164014211" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Apply launcher icon
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert assets/icon/app_icon_1024.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert assets/icon/app_icon_1024.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert assets/icon/app_icon_1024.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert assets/icon/app_icon_1024.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert assets/icon/app_icon_1024.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write signing properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing Android signing secrets"
            exit 1
          fi
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Enable release signing
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            python3 - <<'PY'
          from pathlib import Path

          p = Path("android/app/build.gradle.kts")
          s = p.read_text()

          s = s.replace(
              "plugins {",
              """import java.util.Properties
          import java.io.FileInputStream

          val keystoreProperties = Properties()
          val keystorePropertiesFile = rootProject.file("key.properties")
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(FileInputStream(keystorePropertiesFile))
          }

          plugins {""",
              1,
          )

          s = s.replace(
              "android {",
              """android {
              signingConfigs {
                  create("release") {
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["keyPassword"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["storePassword"] as String
                  }
              }
          """,
              1,
          )

          s = s.replace(
              "signingConfig = signingConfigs.getByName(\"debug\")",
              "signingConfig = signingConfigs.getByName(\"release\")",
          )

          p.write_text(s)
          PY
          fi

          if [ -f android/app/build.gradle ]; then
            python3 - <<'PY'
          from pathlib import Path

          p = Path("android/app/build.gradle")
          s = p.read_text()

          s = s.replace(
              "plugins {",
              """def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          plugins {""",
              1,
          )

          s = s.replace(
              "android {",
              """android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
          """,
              1,
          )

          s = s.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release",
          )

          p.write_text(s)
          PY
          fi

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare direct APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/arabic-debt-ledger-v1.apk
          cat > DOWNLOAD_APK.md <<EOF
          # Download APK

          Direct APK path:

          apk/arabic-debt-ledger-v1.apk

          Package name:

          com.explapp.arabic_debt_ledger
          EOF

      - name: Commit direct APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/arabic-debt-ledger-v1.apk DOWNLOAD_APK.md
          git commit -m "Build signed Arabic Debt Ledger APK" || echo "No APK changes to commit"
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arabic-debt-ledger-v1-signed-apk
          path: apk/arabic-debt-ledger-v1.apk
